<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">

<!-- EN ÖNEMLİ SATIR -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Giriş</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    background: linear-gradient(135deg, #a8edea, #fed6e3);
}

/* Kutu */
.box {
    background: white;
    padding: 30px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);

    width: 90%;
    max-width: 350px;

    transform: scale(0);
    animation: pop 0.6s ease forwards;
}

/* Animasyon */
@keyframes pop {
    0% { transform: scale(0); opacity: 0; }
    70% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); }
}

/* Input */
input {
    padding: 12px;
    width: 100%;
    border-radius: 15px;
    border: 1px solid #ccc;
    font-size: 16px;
    outline: none;
    box-sizing: border-box;
}

/* Button */
button {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    border-radius: 20px;
    border: none;
    background: linear-gradient(135deg, #ff8fab, #ffb3c6);
    color: white;
    font-size: 16px;
    cursor: pointer;
}

/* Hata */
#error {
    margin-top: 10px;
    color: red;
}
</style>
</head>

<body>

<div class="box">
    <h2>İsmini gir</h2>
    <input id="isim" placeholder="İsim...">
    <button onclick="gir()">Giriş Yap</button>
    <p id="error"></p>
</div>

<script>
function gir() {
    let isim = document.getElementById("isim").value.toLowerCase();

    if (isim === "hasan") {
        window.location.href = "hasan.html";
    } 
    else if (isim === "muzaffer") {
        window.location.href = "muzaffer.html";
    } 
    else if (isim === "berkay") {
        window.location.href = "berkay.html";
    } 
    else if (isim === "hazal") {
        window.location.href = "hazal.html";
    } 
    else {
        document.getElementById("error").innerText = "Bu sayfa sana özel değil 😅";
    }
}
</script>

</body>
</html>
