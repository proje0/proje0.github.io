<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hazal</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #ffd1dc, #ffe4e1);
  overflow: hidden;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Çiçek emojileri */
.flower {
  position: absolute;
  font-size: 28px;
  animation: float 5s infinite ease-in-out;
}

@keyframes float {
  0% { transform: translateY(0);}
  50% { transform: translateY(-15px);}
  100% { transform: translateY(0);}
}

/* Ana kutu */
.container {
  width: 90%;
  max-width: 350px;
  background: white;
  border-radius: 25px;
  padding: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* Butonlar */
button {
  padding: 12px 20px;
  border-radius: 20px;
  border: none;
  margin: 8px;
  cursor: pointer;
  font-size: 16px;
}
.openBtn {background:#ff8fab; color:white;}
.closeBtn {background:#ccc;}

/* Mesaj */
#mesaj {
  display: none;
  margin-top: 15px;
  line-height: 1.5;
  font-size: 16px;
}
</style>
</head>
<body>

<!-- Çiçek emojileri ekrana eşit dağıtıldı -->
<div class="flower" style="top:5%; left:5%;">🌸</div>
<div class="flower" style="top:15%; left:30%;">🌸</div>
<div class="flower" style="top:25%; left:60%;">🌺</div>
<div class="flower" style="top:35%; left:80%;">🌷</div>
<div class="flower" style="top:50%; left:10%;">🌹</div>
<div class="flower" style="top:60%; left:40%;">🌸</div>
<div class="flower" style="top:70%; left:70%;">🌺</div>
<div class="flower" style="top:80%; left:25%;">🌷</div>
<div class="flower" style="top:90%; left:55%;">🌹</div>

<div class="container">
  <h2>Bir mektup var 💌</h2>
  <p>Açmak ister misin?</p>

  <button class="openBtn" onclick="ac()">Aç 💖</button>
  <button class="closeBtn" onclick="acma()">Açma 🙈</button>

  <div id="mesaj">
    <p>Son zamanlarda biraz fazla üstüne geldim...</p>
    <p>Aslında tek sebebi seninle vakit geçirmekti.</p>
    <p>Eğer seni sıktıysam gerçekten özür dilerim 💖</p>
    <p>Sen benim için önemlisin 🌸</p>
  </div>
</div>

<script>
function ac() {
  document.getElementById("mesaj").style.display = "block";
}

function acma() {
  alert("Ama içinde önemli bir şey var 🥺");
}
</script>

</body>
</html>
